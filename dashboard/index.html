<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jules | Sprint Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        // Adding tailwindcss-animate via a custom script for the CDN version
        window.tailwind.config.plugins = [
            function({ addUtilities }) {
                addUtilities({
                    '.animate-in': { 'animation-name': 'enter', 'animation-duration': '300ms' },
                    '.fade-in': { 'opacity': '0' },
                    '.slide-in-from-top-2': { 'transform': 'translateY(-0.5rem)' },
                })
            }
        ];
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply bg-slate-900/50 backdrop-blur-md border border-slate-800;
            }
            .status-glow-RUNNING { @apply shadow-[0_0_15px_rgba(56,189,248,0.3)]; }
            .status-glow-COMPLETED { @apply shadow-[0_0_15px_rgba(34,197,94,0.2)]; }
            .status-glow-FAILED { @apply shadow-[0_0_15px_rgba(239,68,68,0.2)]; }
            
            .expand-grid {
                display: grid;
                grid-template-rows: 0fr;
                transition: grid-template-rows 400ms cubic-bezier(0.4, 0, 0.2, 1);
            }
            .expand-grid.expanded {
                grid-template-rows: 1fr;
            }
            .expand-content {
                overflow: hidden;
                opacity: 0;
                transform: translateY(-8px) scale(0.99);
                transition: opacity 300ms ease, transform 400ms cubic-bezier(0.4, 0, 0.2, 1);
            }
            .expanded .expand-content {
                opacity: 1;
                transform: translateY(0) scale(1);
                transition-delay: 50ms;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full font-sans text-slate-200 antialiased">
    <div id="app" class="min-h-full"></div>

    <script type="module">
        import { render } from 'https://esm.sh/preact';
        import { h } from 'https://esm.sh/preact';
        import { App } from './src/app.js';

        render(h(App), document.getElementById('app'));
    </script>
</body>
</html>
