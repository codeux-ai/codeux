<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jules | Sprint Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply bg-slate-900/50 backdrop-blur-md border border-slate-800;
            }
            .status-glow-RUNNING { @apply shadow-[0_0_15px_rgba(56,189,248,0.3)]; }
            .status-glow-COMPLETED { @apply shadow-[0_0_15px_rgba(34,197,94,0.2)]; }
            .status-glow-FAILED { @apply shadow-[0_0_15px_rgba(239,68,68,0.2)]; }
        }
    </style>
</head>
<body class="h-full font-sans text-slate-200 antialiased">
    <div id="app" class="min-h-full"></div>

    <script type="module">
        import { h, render } from 'https://esm.sh/preact';
        import { useState, useEffect, useMemo } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';

        const html = htm.bind(h);

        function App() {
            const [status, setStatus] = useState({ subtasks: [], timestamp: null });
            const [error, setError] = useState(null);

            const fetchData = async () => {
                try {
                    const res = await fetch('/api/status');
                    const data = await res.json();
                    setStatus(data);
                    setError(null);
                } catch (err) {
                    setError('Unable to connect to Orchestrator API');
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 4000);
                return () => clearInterval(interval);
            }, []);

            const stats = useMemo(() => {
                const tasks = status.subtasks || [];
                return {
                    total: tasks.length,
                    running: tasks.filter(t => t.status === 'RUNNING').length,
                    completed: tasks.filter(t => t.status === 'COMPLETED').length,
                    failed: tasks.filter(t => t.status === 'FAILED').length,
                };
            }, [status.subtasks]);

            if (error) return html`
                <div class="flex items-center justify-center min-h-screen">
                    <div class="glass p-8 rounded-2xl text-center max-w-md">
                        <div class="text-red-400 text-5xl mb-4">⚠️</div>
                        <h2 class="text-xl font-bold mb-2 text-white">Connection Lost</h2>
                        <p class="text-slate-400">${error}</p>
                    </div>
                </div>
            `;

            const getStatusColor = (s) => {
                switch(s) {
                    case 'RUNNING': return 'bg-sky-500/10 text-sky-400 border-sky-500/20';
                    case 'COMPLETED': return 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';
                    case 'FAILED': return 'bg-red-500/10 text-red-400 border-red-500/20';
                    case 'BLOCKED': return 'bg-amber-500/10 text-amber-400 border-amber-500/20';
                    default: return 'bg-slate-800/50 text-slate-400 border-slate-700';
                }
            };

            return html`
                <div class="relative min-h-screen flex flex-col">
                    <!-- Background Ambient Glow -->
                    <div class="fixed top-0 -left-4 w-96 h-96 bg-purple-500/10 rounded-full blur-[128px] pointer-events-none"></div>
                    <div class="fixed bottom-0 -right-4 w-96 h-96 bg-blue-500/10 rounded-full blur-[128px] pointer-events-none"></div>

                    <!-- Header -->
                    <header class="sticky top-0 z-50 glass border-x-0 border-t-0 py-4">
                        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/20">J</div>
                                <div>
                                    <h1 class="font-bold text-white tracking-tight">Sprint ${status.sprint_number || '?'}</h1>
                                    <p class="text-xs text-slate-400 font-mono">${status.feature_branch || 'initializing...'}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="hidden md:flex gap-4">
                                    <div class="text-right">
                                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Health</p>
                                        <p class="text-sm font-medium text-emerald-400">Optimal</p>
                                    </div>
                                    <div class="text-right border-l border-slate-800 pl-4">
                                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Sync</p>
                                        <p class="text-sm font-medium text-slate-300">${status.timestamp ? 'Live' : 'Polling'}</p>
                                    </div>
                                </div>
                                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                            </div>
                        </div>
                    </header>

                    <!-- Main Content -->
                    <main class="flex-grow max-w-7xl mx-auto px-6 py-8 w-full">
                        <!-- Stats Overview -->
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                            ${[
                                { label: 'Total Tasks', value: stats.total, color: 'text-white' },
                                { label: 'Active', value: stats.running, color: 'text-sky-400', pulse: stats.running > 0 },
                                { label: 'Completed', value: stats.completed, color: 'text-emerald-400' },
                                { label: 'Failures', value: stats.failed, color: stats.failed > 0 ? 'text-red-400' : 'text-slate-500' }
                            ].map(stat => html`
                                <div class="glass p-4 rounded-2xl relative overflow-hidden group">
                                    <div class="relative z-10">
                                        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">${stat.label}</p>
                                        <p class="text-3xl font-bold ${stat.color} tracking-tighter">
                                            ${stat.value}
                                            ${stat.pulse && html`<span class="inline-block w-2 h-2 rounded-full bg-sky-500 ml-2 animate-ping"></span>`}
                                        </p>
                                    </div>
                                    <div class="absolute -right-2 -bottom-2 text-6xl opacity-[0.03] font-black pointer-events-none">${stat.value}</div>
                                </div>
                            `)}
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <!-- Pipeline -->
                            <div class="lg:col-span-8">
                                <div class="flex items-center justify-between mb-6">
                                    <h2 class="text-xl font-bold text-white flex items-center gap-2">
                                        Task Pipeline
                                        <span class="px-2 py-0.5 bg-slate-800 rounded text-xs text-slate-400 font-mono">${stats.total}</span>
                                    </h2>
                                </div>

                                <div class="space-y-4">
                                    ${stats.total === 0 ? html`
                                        <div class="glass border-dashed p-12 rounded-2xl text-center">
                                            <p class="text-slate-500">Awaiting sprint decomposition...</p>
                                        </div>
                                    ` : status.subtasks.map(task => html`
                                        <div class="glass p-5 rounded-2xl hover:bg-slate-900/80 transition-all duration-300 group status-glow-${task.status}">
                                            <div class="flex items-start justify-between gap-4">
                                                <div class="flex-grow">
                                                    <div class="flex items-center gap-3 mb-2">
                                                        <span class="font-mono text-[10px] font-bold px-2 py-0.5 bg-slate-800 rounded text-slate-400 group-hover:text-slate-200 transition-colors">#${task.id}</span>
                                                        <h3 class="font-semibold text-white group-hover:text-blue-400 transition-colors">${task.title}</h3>
                                                    </div>
                                                    <p class="text-sm text-slate-400 line-clamp-2 mb-4 leading-relaxed">${task.prompt}</p>
                                                    
                                                    <div class="flex flex-wrap items-center gap-4">
                                                        ${task.depends_on.length > 0 && html`
                                                            <div class="flex items-center gap-2 text-[10px] text-slate-500">
                                                                <span class="uppercase font-bold tracking-tighter">Blocking:</span>
                                                                <div class="flex gap-1">
                                                                    ${task.depends_on.map(dep => html`<span class="px-1.5 py-0.5 bg-slate-800/50 rounded border border-slate-700/50 text-slate-400">${dep}</span>`)}
                                                                </div>
                                                            </div>
                                                        `}
                                                        ${task.is_merged && html`
                                                            <div class="flex items-center gap-1.5 text-[10px] font-bold text-emerald-500 uppercase tracking-widest">
                                                                <span class="w-1 h-1 rounded-full bg-emerald-500"></span>
                                                                Code Merged
                                                            </div>
                                                        `}
                                                    </div>
                                                </div>
                                                <div class="flex flex-col items-end gap-3">
                                                    <span class="status-badge px-3 py-1 rounded-full text-[10px] font-bold border transition-all duration-500 ${getStatusColor(task.status)}">
                                                        ${task.status}
                                                    </span>
                                                    ${task.session_id && html`
                                                        <div class="text-[9px] font-mono text-slate-600 group-hover:text-slate-400 transition-colors">
                                                            ${task.session_id.substring(0, 12)}...
                                                        </div>
                                                    `}
                                                </div>
                                            </div>
                                        </div>
                                    `)}
                                </div>
                            </div>

                            <!-- Activity Sidebar -->
                            <div class="lg:col-span-4 space-y-8">
                                <section>
                                    <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                                        Activity
                                        <div class="h-px flex-grow bg-slate-800"></div>
                                    </h2>
                                    <div class="glass rounded-2xl p-6 relative overflow-hidden">
                                        <div class="absolute top-0 right-0 p-4 opacity-5">
                                            <svg class="w-12 h-12 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                                        </div>
                                        <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Latest Logs</h4>
                                        <div class="text-xs text-slate-300 font-mono leading-relaxed space-y-2 whitespace-pre-wrap">
                                            ${status.reportText || 'Waiting for activity...'}
                                        </div>
                                    </div>
                                </section>

                                <section>
                                    <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2 text-amber-400">
                                        Protocol
                                        <div class="h-px flex-grow bg-slate-800"></div>
                                    </h2>
                                    <div class="glass border-amber-500/20 rounded-2xl p-6">
                                        <h4 class="text-[10px] font-bold text-amber-500/60 uppercase tracking-[0.2em] mb-4">Action Required</h4>
                                        <div class="text-xs text-amber-100/70 font-mono leading-relaxed space-y-3 whitespace-pre-wrap">
                                            ${status.instructions || 'Orchestration optimal. No manual intervention needed.'}
                                        </div>
                                    </div>
                                </section>

                                <footer class="pt-10">
                                    <p class="text-[10px] text-slate-600 font-medium tracking-wide">
                                        JULES SUBAGENTS MCP V1.2.0 • PROTOCOL 4444
                                    </p>
                                </footer>
                            </div>
                        </div>
                    </main>
                </div>
            `;
        }

        render(html`<${App} />`, document.getElementById('app'));
    </script>
</body>
</html>
